# 一键运行：docker compose up
# 换机器验证：克隆仓库 → docker compose up → 打开 8788/8789/8790
services:
  dev:
    image: node:24-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      SLOTS_DOCKER: "1"
    ports:
      - "8788:8788" # server API
      - "8789:8789" # web 游戏
      - "8790:8790" # admin 后台
    volumes:
      - .:/app
      # node_modules 与 data 全部用容器内独立卷：
      # ① 避免与宿主机二进制冲突 ② 防止容器内 root 写穿 bind mount 污染宿主机文件属主
      - node_modules:/app/node_modules
      - nm_engine:/app/packages/engine/node_modules
      - nm_server:/app/apps/server/node_modules
      - nm_web:/app/apps/web/node_modules
      - nm_admin:/app/apps/admin/node_modules
      - slots_data:/app/data

volumes:
  node_modules:
  nm_engine:
  nm_server:
  nm_web:
  nm_admin:
  slots_data:

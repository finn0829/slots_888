<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>雀胡 · 麻将消消乐</title>
  </head>
  <body>
    <canvas id="fx" aria-hidden="true"></canvas>
    <aside id="paytable" aria-label="赔付表"></aside>
    <div id="app">
      <div class="plaque">
        <span class="plaque-deco left"></span>
        <h1>雀 · 胡</h1>
        <span class="plaque-deco right"></span>
      </div>

      <div class="topbar">
        <div class="stat">
          <span class="label">余额</span>
          <span class="value" id="balance">—</span>
        </div>
        <div class="claim" id="claim">
          <button id="claim-daily" title="每日签到">签到 +1000</button>
          <button id="claim-relief" title="破产救济金">补给 +2000</button>
        </div>
        <div class="stat right">
          <span class="label">本局赢</span>
          <span class="value win" id="win">0</span>
        </div>
        <button id="stats-btn" title="我的战绩" aria-label="我的战绩">战绩</button>
      </div>

      <div class="freespins" id="freespins">
        <span>免费旋转 <b id="freespins-count">0</b> 次</span>
        <span>累计倍数 <b id="freespins-mult">×1</b></span>
      </div>

      <button class="ante" id="ante" aria-label="加注模式">
        <span class="ante-box"><input type="checkbox" id="ante-check" tabindex="-1" aria-hidden="true" /></span>
        <span class="ante-main">
          <b>加注</b>
          <span class="ante-cost">实扣 <em id="ante-cost">—</em></span>
        </span>
        <span class="ante-gain">
          <em id="ante-speed">—</em>
          <span>免费旋转更快</span>
        </span>
        <span class="ante-detail" id="ante-detail"></span>
      </button>

      <div class="board-wrap">
        <div class="frame">
          <span class="corner tl"></span><span class="corner tr"></span>
          <span class="corner bl"></span><span class="corner br"></span>
          <canvas id="board" role="img" aria-label="麻将牌盘面"></canvas>
        </div>
        <div id="chain" aria-hidden="true"></div>
        <div id="mult-pop" aria-hidden="true"></div>
      </div>

      <div class="dice-bar" title="集满骰子必得免费旋转">
        <div id="dice-fill"></div>
        <div id="dice-label">🎲 0/100</div>
      </div>

      <div class="controls">
        <div class="bet-group">
          <button id="bet-minus" aria-label="减小下注">−</button>
          <div>
            <div class="label">下注</div>
            <div id="bet">100</div>
            <div class="bet-cost" id="bet-cost"></div>
          </div>
          <button id="bet-plus" aria-label="加大下注">＋</button>
        </div>
        <button id="spin">开 局</button>
        <button class="bonus-buy" id="bonus-buy" title="直接买入免费旋转" aria-label="买入免费旋转">
          <b>买免费旋转</b>
          <span class="bonus-buy-cost" id="bonus-buy-cost">—</span>
        </button>
        <div class="side-btns">
          <button id="auto" title="自动旋转" aria-label="自动旋转">自动</button>
          <button id="turbo" title="快速模式" aria-label="快速模式">疾</button>
          <button id="mute" title="音效开关" aria-label="音效开关">音</button>
          <button id="info" title="游戏规则" aria-label="游戏规则">ⓘ</button>
        </div>

        <div class="auto-panel" id="auto-panel">
          <h4>自动旋转</h4>
          <div class="auto-counts" id="auto-counts"></div>
          <label><input type="checkbox" id="auto-stop-feature" /> 触发免费旋转时停止</label>
          <label><input type="checkbox" id="auto-stop-bigwin" /> 赢得大奖（≥25×）时停止</label>
          <p class="dim">余额不足会自动停止 · 空格键随时中断</p>
        </div>
      </div>

      <div class="rules" id="rules">
        <div class="rules-card">
          <header>
            <h2>雀胡 · 玩法说明</h2>
            <button id="rules-close" aria-label="关闭">✕</button>
          </header>
          <div id="rules-body"></div>
        </div>
      </div>

      <div class="rules" id="stats">
        <div class="rules-card">
          <header>
            <h2>我的战绩</h2>
            <button id="stats-close" aria-label="关闭">✕</button>
          </header>
          <div id="stats-body"></div>
          <div class="history" id="history">
            <h4>最近记录 <small>点一条看终盘</small></h4>
            <div id="history-list"></div>
            <button id="history-more" class="history-more">加载更多</button>
          </div>
        </div>
      </div>

      <div class="banner" id="banner">
        <span class="ribbon r1" aria-hidden="true"></span>
        <span class="ribbon r2" aria-hidden="true"></span>
        <div id="banner-text"></div>
        <div id="banner-sub"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
